name: Parse CIS CAT Equipment

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch: {}

defaults:
  run:
    working-directory: tender-parser

jobs:
  parse-mascus:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tender-parser/requirements-parser.txt
      - run: pip install -r requirements-parser.txt

      - name: Parse Mascus (httpx — no Playwright needed)
        continue-on-error: true
        timeout-minutes: 10
        run: python scripts/run_parser.py --source cis_cat_intl
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  parse-playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies + Playwright
        run: |
          pip install -r requirements-parser.txt
          pip install playwright
          playwright install chromium --with-deps

      - name: Parse Avito + Kolesa.kz (Playwright)
        continue-on-error: true
        timeout-minutes: 20
        run: python scripts/run_parser.py --source cis_cat_local
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
