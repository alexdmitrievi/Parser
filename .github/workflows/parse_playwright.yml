name: Parse Playwright (TekTorg + Fabrikant)

on:
  schedule:
    - cron: '0 6,18 * * *'  # Каждые 12 часов
  workflow_dispatch:  # Ручной запуск

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r tender-parser/requirements-parser.txt
          pip install playwright
          playwright install chromium --with-deps

      - name: Run Playwright parsers
        working-directory: tender-parser
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/run_parser.py --source playwright
