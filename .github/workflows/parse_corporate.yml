name: Parse Corporate Platforms

on:
  schedule:
    - cron: '0 */8 * * *'  # Каждые 8 часов
  workflow_dispatch:
    inputs:
      group:
        description: 'Группа площадок'
        required: false
        default: 'corporate'
        type: choice
        options:
          - corporate
          - corporate_energy
          - corporate_telecom
          - corporate_retail
          - sberb2b
          - rosatom
          - rosneft
          - gazprom
          - lukoil
          - nornickel
          - mts_tenders
          - rostelecom
          - x5group
          - magnit

defaults:
  run:
    working-directory: tender-parser

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tender-parser/requirements-parser.txt
      - run: pip install -r requirements-parser.txt

      - name: Parse Corporate Platforms
        run: python scripts/run_parser.py --source ${{ inputs.group || 'corporate' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Send notifications
        run: python scripts/run_notifier.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
