name: Parse Commercial Platforms

on:
  schedule:
    - cron: '0 */6 * * *'  # Каждые 6 часов (чаще = больше тендеров)
  workflow_dispatch: {}

defaults:
  run:
    working-directory: tender-parser

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tender-parser/requirements-parser.txt
      - run: pip install -r requirements-parser.txt

      - name: Parse Commercial (B2B-Center, TenderGuru)
        continue-on-error: true
        timeout-minutes: 18
        run: python scripts/run_parser.py --source commercial
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Send notifications
        continue-on-error: true
        timeout-minutes: 5
        run: python scripts/run_notifier.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
