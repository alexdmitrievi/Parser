name: Parse Federal ETPs

on:
  schedule:
    - cron: '0 3,15 * * *'  # 2 раза в день (03:00, 15:00 UTC)
  workflow_dispatch: {}

defaults:
  run:
    working-directory: tender-parser

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tender-parser/requirements-parser.txt
      - run: pip install -r requirements-parser.txt

      - name: Parse Federal ETPs (Roseltorg, Sberbank-AST, RTS, TekTorg)
        run: python scripts/run_parser.py --source etp
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Send notifications
        run: python scripts/run_notifier.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
