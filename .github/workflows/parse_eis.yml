name: Parse EIS (Government)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

defaults:
  run:
    working-directory: tender-parser

jobs:
  parse-api:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tender-parser/requirements-parser.txt
      - run: pip install -r requirements-parser.txt

      - name: Parse EIS API
        continue-on-error: true
        timeout-minutes: 20
        run: python scripts/run_parser.py --source eis_api
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Parse Roseltorg
        continue-on-error: true
        timeout-minutes: 10
        run: python scripts/run_parser.py --source roseltorg
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  parse-ftp:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tender-parser/requirements-parser.txt
      - run: pip install -r requirements-parser.txt

      - name: Parse EIS FTP
        continue-on-error: true
        run: timeout 600 python scripts/run_parser.py --source eis_ftp || true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
