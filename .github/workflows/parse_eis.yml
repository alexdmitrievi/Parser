name: Parse EIS (Government)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

defaults:
  run:
    working-directory: tender-parser

jobs:
  parse-eis-main:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tender-parser/requirements-parser.txt
      - name: Install dependencies
        run: pip install -r requirements-parser.txt

      - name: Check secrets
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "WARNING: SUPABASE_URL is not set"
          else
            echo "OK: SUPABASE_URL is set"
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}

      - name: Parse EIS API (main queries)
        continue-on-error: true
        timeout-minutes: 15
        run: python scripts/run_parser.py --source eis_api
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  parse-roseltorg:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tender-parser/requirements-parser.txt
      - name: Install dependencies
        run: pip install -r requirements-parser.txt

      - name: Parse Roseltorg
        continue-on-error: true
        timeout-minutes: 12
        run: python scripts/run_parser.py --source roseltorg
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  parse-ftp:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tender-parser/requirements-parser.txt
      - name: Install dependencies
        run: pip install -r requirements-parser.txt

      - name: Parse EIS FTP
        continue-on-error: true
        timeout-minutes: 10
        run: timeout 500 python scripts/run_parser.py --source eis_ftp || true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
