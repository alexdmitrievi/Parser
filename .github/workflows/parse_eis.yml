name: Parse EIS (Government)

on:
  schedule:
    - cron: '0 */6 * * *'  # Каждые 6 часов
  workflow_dispatch: {}

defaults:
  run:
    working-directory: tender-parser

jobs:
  parse-api:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tender-parser/requirements-parser.txt
      - run: pip install -r requirements-parser.txt

      - name: Parse EIS API
        run: python scripts/run_parser.py --source eis_api
        timeout-minutes: 12
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Parse Roseltorg
        run: python scripts/run_parser.py --source roseltorg
        timeout-minutes: 5
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  parse-ftp:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tender-parser/requirements-parser.txt
      - run: pip install -r requirements-parser.txt

      - name: Parse EIS FTP
        run: timeout 600 python scripts/run_parser.py --source eis_ftp || echo "EIS FTP timed out or failed, continuing"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
