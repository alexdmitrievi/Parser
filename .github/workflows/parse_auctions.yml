name: Parse Auctions (РАД + Торги.гов.ру)

on:
  schedule:
    - cron: '0 5,17 * * *'
  workflow_dispatch: {}

jobs:
  parse-rad:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tender-parser/requirements-parser.txt
      - run: pip install -r tender-parser/requirements-parser.txt

      - name: Parse РАД (lot-online)
        continue-on-error: true
        timeout-minutes: 10
        working-directory: tender-parser
        run: python -c "
          import logging, sys;
          logging.basicConfig(level=logging.INFO, format='%(message)s');
          sys.path.insert(0, '.');
          from scrapers.lot_online import LotOnlineScraper;
          from shared.db import insert_tenders;
          from pipeline.normalizer import normalize_batch;
          from pipeline.tagger import tag_tenders_batch;
          s = LotOnlineScraper();
          t = s.run(max_pages=5);
          print(f'Parsed: {len(t)}');
          t = normalize_batch(t);
          t = tag_tenders_batch(t);
          c = insert_tenders(t);
          print(f'Saved: {c}')
          "
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  parse-torgi-gov:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r tender-parser/requirements-parser.txt
          pip install playwright
          playwright install chromium --with-deps

      - name: Parse Торги.гов.ру
        continue-on-error: true
        timeout-minutes: 10
        working-directory: tender-parser
        run: python -c "
          import logging, sys;
          logging.basicConfig(level=logging.INFO, format='%(message)s');
          sys.path.insert(0, '.');
          from scrapers.torgi_gov_pw import TorgiGovPlaywrightScraper;
          from shared.db import insert_tenders;
          from pipeline.normalizer import normalize_batch;
          from pipeline.tagger import tag_tenders_batch;
          s = TorgiGovPlaywrightScraper();
          t = s.run(max_pages=5);
          print(f'Parsed: {len(t)}');
          t = normalize_batch(t);
          t = tag_tenders_batch(t);
          c = insert_tenders(t);
          print(f'Saved: {c}')
          "
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
