name: Parse Auctions (РАД + Торги.гов.ру)

on:
  schedule:
    - cron: '0 5,17 * * *'
  workflow_dispatch: {}

defaults:
  run:
    working-directory: tender-parser

jobs:
  parse-rad:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tender-parser/requirements-parser.txt
      - run: pip install -r requirements-parser.txt

      - name: Parse РАД (lot-online)
        continue-on-error: true
        timeout-minutes: 10
        run: python scripts/run_parser.py --source auctions_rad
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  parse-torgi-gov:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements-parser.txt
          pip install playwright
          playwright install chromium --with-deps

      - name: Parse Торги.гов.ру
        continue-on-error: true
        timeout-minutes: 10
        run: python scripts/run_parser.py --source auctions_torgi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
