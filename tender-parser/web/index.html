<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Поиск тендеров — Тендер PRO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/web/styles.css" />
  <link rel="icon" type="image/png" href="/web/icon-192.png" />
  <link rel="manifest" href="/web/manifest.json" />
  <meta name="theme-color" content="#0a0e17" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/web/icon-192.png" />
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">
      <img src="/web/logo.png" alt="Тендер PRO" class="logo-img" />
      <span>Тендер PRO</span>
    </div>
    <div class="navbar-links">
      <a href="/web/" class="nav-link active">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <span>Поиск</span>
      </a>
      <a href="/web/favorites.html" class="nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        <span>Избранное</span>
      </a>
      <a href="/web/subscribe.html" class="nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        <span>Подписки</span>
      </a>
    </div>
  </nav>

  <div class="container">
    <header class="page-header">
      <h1>Поиск тендеров</h1>
      <p class="subtitle">Находите государственные и коммерческие закупки по всей России</p>
    </header>

    <!-- Filters -->
    <section class="glass form-panel">
      <form id="search-form" novalidate>
        <!-- Row 1: Keywords (full width, with search icon) -->
        <div class="field">
          <label class="field-label" for="q">Ключевые слова</label>
          <div class="search-input-wrap">
            <span class="search-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </span>
            <input type="text" name="q" id="q" placeholder="Например: ремонт, поставка оборудования, IT-услуги..." autocomplete="off" />
          </div>
        </div>

        <!-- Row 2: Region + Law type -->
        <div class="form-row form-row-2">
          <div class="field">
            <label class="field-label" for="region">Регион</label>
            <div class="autocomplete-wrap">
              <input type="text" name="region" id="region" placeholder="Москва, Омская область..." autocomplete="off" />
              <div id="region-dropdown" class="autocomplete-dropdown hidden"></div>
            </div>
          </div>
          <div class="field">
            <label class="field-label" for="law_type">Тип закона</label>
            <select name="law_type" id="law_type">
              <option value="">Все типы</option>
              <option value="44-fz">44-ФЗ</option>
              <option value="223-fz">223-ФЗ</option>
              <option value="commercial">Коммерческие</option>
            </select>
          </div>
        </div>

        <!-- Row 3: NMCK range -->
        <div class="form-row form-row-2">
          <div class="field">
            <label class="field-label" for="min_nmck">Цена от, &#8381;</label>
            <input type="number" name="min_nmck" id="min_nmck" min="0" step="1000" placeholder="Минимальная сумма" />
          </div>
          <div class="field">
            <label class="field-label" for="max_nmck">Цена до, &#8381;</label>
            <input type="number" name="max_nmck" id="max_nmck" min="0" step="1000" placeholder="Максимальная сумма" />
          </div>
        </div>

        <!-- Advanced filters toggle -->
        <button type="button" id="advanced-toggle" class="advanced-toggle">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          Расширенные фильтры
        </button>
        <div id="advanced-body" class="advanced-body">
          <div class="form-row form-row-3">
            <div class="field">
              <label class="field-label" for="niche">Категория</label>
              <select name="niche" id="niche">
                <option value="">Любая</option>
              </select>
            </div>
            <div class="field">
              <label class="field-label" for="purchase_method">Способ закупки</label>
              <select name="purchase_method" id="purchase_method">
                <option value="">Любой</option>
              </select>
            </div>
            <div class="field">
              <label class="field-label" for="source_platform">Площадка</label>
              <select name="source_platform" id="source_platform">
                <option value="">Все площадки</option>
              </select>
            </div>
          </div>
          <div class="form-row form-row-3">
            <div class="field">
              <label class="field-label" for="date_from">Опубликовано от</label>
              <input type="date" name="date_from" id="date_from" />
            </div>
            <div class="field">
              <label class="field-label" for="date_to">Опубликовано до</label>
              <input type="date" name="date_to" id="date_to" />
            </div>
            <div class="field">
              <label class="field-label" for="per_page">На странице</label>
              <select name="per_page" id="per_page">
                <option value="10" selected>10</option>
                <option value="20">20</option>
                <option value="50">50</option>
              </select>
            </div>
          </div>
        </div>

        <input type="hidden" name="page" id="page" value="1" />

        <div class="actions">
          <button type="submit" id="btn-search" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            Найти тендеры
          </button>
          <button type="button" id="btn-reset" class="btn btn-ghost">Сбросить</button>
        </div>
      </form>
    </section>

    <!-- Status -->
    <p id="status" class="status-msg" role="status" aria-live="polite"></p>

    <!-- Results toolbar -->
    <div id="results-toolbar" class="results-toolbar hidden">
      <div class="results-count" id="results-count"></div>
      <div class="toolbar-actions">
        <button type="button" id="btn-export" class="btn btn-ghost btn-sm" title="Экспорт в CSV">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
          CSV
        </button>
        <div class="sort-group">
          <label for="sort-select">Сортировка:</label>
          <select id="sort-select">
            <option value="created_at">По дате добавления</option>
            <option value="deadline">По дедлайну</option>
            <option value="nmck">По цене (НМЦК)</option>
            <option value="publish_date">По дате публикации</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Results -->
    <section id="results" class="results-grid" aria-label="Результаты поиска"></section>

    <!-- Pagination -->
    <nav id="pager" class="pager hidden" aria-label="Пагинация">
      <button type="button" id="btn-prev" class="btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Назад
      </button>
      <span id="page-info" class="page-info"></span>
      <button type="button" id="btn-next" class="btn">
        Вперёд
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </button>
    </nav>
  </div>

  <script src="/web/app.js"></script>
</body>
</html>
